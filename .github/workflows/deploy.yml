name: Deploy
on:
  push:
    branches: [main]
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test -- --run --passWithNoTests
      - run: npm run build
      # Hosting deploys FIRST so the app always ships, even if the rules step below
      # can't run (the GitHub-action service account only has Hosting-admin rights).
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CHA_CHING_C3470 }}
          channelId: live
          projectId: cha-ching-c3470
      - name: Write service account for CLI
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_CHA_CHING_C3470 }}' > ${{ runner.temp }}/gcp-sa.json
      # Best-effort: turns fully green once the SA is granted the "Firebase Rules Admin"
      # role in the console. Until then, rules are deployed manually and this won't block the app.
      - name: Deploy Firestore rules (best-effort)
        continue-on-error: true
        run: npx firebase-tools deploy --only firestore:rules --project cha-ching-c3470 --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp-sa.json
